name: harmber_movies
description: Harmber Movies - Google TV style streaming app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.11.0
  webview_flutter_wkwebview: ^3.19.1
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.3.2
  smooth_page_indicator: ^1.2.0+3
  url_launcher: ^6.3.1
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.6.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/

# ✅ MUST be outside flutter:
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21